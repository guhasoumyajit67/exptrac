{% extends "base.html" %}

{% block title %}Deleting Record...{% endblock title %}

{% block content %}
<div class="row justify-content-center px-3 mt-5">
    <div class="col-md-6 col-lg-4 text-center">
        <div class="p-5 bg-white rounded-4 shadow-sm border">
            <div class="spinner-border text-danger mb-4" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h2 class="h4 fw-extrabold text-dark mb-2">Processing Deletion</h2>
            <p class="text-muted small mb-0">Securing your ledger database records, please wait...</p>

            <form id="auto-delete-form" method="POST">
                {% csrf_token %}
            </form>
        </div>
    </div>
</div>

<script>
    // Automatically executes the database drop operation instantly without forcing a second button click
    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("auto-delete-form").submit();
    });
</script>
{% endblock content %}
