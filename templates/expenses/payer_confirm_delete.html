{% extends "base.html" %}

{% block title %}Delete Payer Profile{% endblock title %}

{% block content %}
<div class="row justify-content-center px-3 mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="p-4 p-sm-5 bg-white rounded-4 shadow-sm border text-center">
            
            <div class="text-danger mb-4">
                <i class="bi bi-exclamation-triangle-fill display-4"></i>
            </div>

            <h1 class="h3 fw-extrabold text-dark tracking-tight mb-2">Delete Payer Profile?</h1>
            <p class="text-muted small mb-4">
                Are you sure you want to permanently remove the profile <strong>"{{ object.name }}"</strong>? This action cannot be undone.
            </p>

            <form method="POST">
                {% csrf_token %}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger btn-lg rounded-3 fw-bold fs-6 py-2.5 shadow-sm">
                        Yes, Confirm Delete
                    </button>
                    <a href="{% url 'create_transaction' %}" class="btn btn-light border text-secondary py-2 rounded-3 fw-medium small">
                        Cancel and Go Back
                    </a>
                </div>
            </form>

        </div>
    </div>
</div>
{% endblock content %}
