{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Edit Profile - ExpTrac{% endblock title %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <h3 class="fw-bold text-center mb-3">Edit Profile</h3>
                    <p class="text-muted text-center small mb-4">Update your personal information below.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        {{ form|crispy }}
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary rounded-3 py-2 fw-bold">
                                <i class="bi bi-check2 me-2"></i>Save Changes
                            </button>
                            <a href="{% url 'profile' %}" class="btn btn-outline-secondary rounded-3 py-2">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
