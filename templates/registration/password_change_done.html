{% extends "base.html" %}

{% block title %}Password Change Successful{% endblock title %}

{% block content %}
<div class="row justify-content-center px-3 mt-5">
    <div class="col-11 col-sm-8 col-md-6 col-lg-5 text-center">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <div class="card-body">
                
                <div class="text-success mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                </div>
                
                <h2 class="fw-bold text-dark mb-2">Password Changed!</h2>
                <p class="text-muted mb-4">Your account has been securely updated.</p>
                
                <div class="d-grid">
                    <a href="{% url 'home' %}" class="btn btn-primary rounded-3 py-2 fw-bold">
                        Return to Dashboard
                    </a>
                </div>
                
            </div>
        </div>
    </div>
</div>
{% endblock content %}
