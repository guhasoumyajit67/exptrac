{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log In{% endblock title %}

{% block content %}
<div class="row justify-content-center align-items-center px-3" style="min-height: calc(100vh - 56px);">
    <div class="col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <h2 class="text-center mb-4 fw-bold text-dark">Log In</h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {{ form|crispy }}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary rounded-3 py-2 fw-bold">Log In</button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none small text-secondary">
                        Forgot your password?
                    </a>
                </div>
                
            </div>
        </div>
    </div>
</div>
{% endblock content %}
