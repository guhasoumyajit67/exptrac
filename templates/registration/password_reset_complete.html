{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock title %}

{% block content %}
<div class="row justify-content-center px-3 mt-5">
    <div class="col-11 col-sm-8 col-md-6 col-lg-5 text-center">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <div class="card-body">
                
                <div class="text-success mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="currentColor" class="bi bi-shield-lock-fill" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 63 63 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915V9.5a.5.5 0 0 1-1 0V7.915A1.5 1.5 0 0 1 8 5"/>
                    </svg>
                </div>
                
                <h2 class="fw-bold text-dark mb-2">Reset Complete!</h2>
                <p class="text-muted small mb-4">
                    Your new password has been set successfully. You're ready to log back into your account.
                </p>
                
                <div class="d-grid">
                    <a href="{% url 'login' %}" class="btn btn-primary rounded-3 py-2 fw-bold">
                        Go to Log In Page
                    </a>
                </div>
                
            </div>
        </div>
    </div>
</div>
{% endblock content %}
