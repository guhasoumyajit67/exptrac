{% extends "base.html" %}

{% block title %}Email Sent{% endblock title %}

{% block content %}
<div class="row justify-content-center px-3 mt-5">
    <div class="col-11 col-sm-8 col-md-6 col-lg-5 text-center">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <div class="card-body">
                
                <div class="text-primary mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="currentColor" class="bi bi-envelope-open" viewBox="0 0 16 16">
                        <path d="M8.47 1.318a1 1 0 0 0-.94 0l-6 3.2A1 1 0 0 0 1 5.4v.817l5.75 3.45L8 8.917l1.25.75 5.75-3.45V5.4a1 1 0 0 0-.53-.882zM15 7.383l-4.778 2.867L15 13.117zm-.003 6.88L10.082 10.4 8 11.65l-2.082-1.25L1.003 14.263A1 1 0 0 0 2 15h12a1 1 0 0 0 .997-.737M1 13.116l4.778-2.867L1 7.383v5.734zM7.061.171a2 2 0 0 1 1.878 0l6 3.2A2 2 0 0 1 16 5.4v8.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V5.4a2 2 0 0 1 1.061-1.772z"/>
                    </svg>
                </div>
                
                <h2 class="fw-bold text-dark mb-2">Check Your Inbox</h2>
                <p class="text-muted small mb-4">
                    We've emailed you instructions for setting your password. You should receive the message shortly.
                </p>
                
                <div class="d-grid">
                    <a href="{% url 'login' %}" class="btn btn-primary rounded-3 py-2 fw-bold">
                        Go to Log In
                    </a>
                </div>
                
            </div>
        </div>
    </div>
</div>
{% endblock content %}
