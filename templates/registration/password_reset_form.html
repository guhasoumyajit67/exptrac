{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Forgot Your Password{% endblock title %}

{% block content %}
<div class="row justify-content-center align-items-center px-3" style="min-height: calc(100vh - 56px);">
    <div class="col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <h2 class="text-center mb-3 fw-bold text-dark">Forgot Password</h2>
                <p class="text-muted text-center small mb-4">
                    Enter your email address below, and we will send you instructions for setting a new one.
                </p>
                
                <form method="post" action="">
                    {% csrf_token %}
                    
                    {{ form|crispy }}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary rounded-3 py-2 fw-bold">
                            Send Me Instructions
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
